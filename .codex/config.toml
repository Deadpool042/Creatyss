personality = "pragmatic"

[mcp_servers.lean-ctx]
command = "lean-ctx"

[mcp_servers.playwright]
args = ["@playwright/mcp@latest"]
command = "npx"
enabled = false

[mcp_servers.shadcn]
args = [
    "shadcn@latest",
    "mcp",
]
command = "npx"
enabled = false

[mcp_servers.creatyss-rag]
command = "pnpm"
args = [
    "tsx",
    "scripts/rag/mcp-server.ts",
]

[mcp_servers.mempalace]
command = "mempalace-mcp"
