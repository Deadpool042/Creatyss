services:
  db:
    container_name: creatyss-db
    image: postgres:17-alpine
    profiles: ["core"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    mem_limit: 768m
    restart: unless-stopped

  app:
    image: creatyss-dev
    container_name: creatyss-app
    profiles: ["core"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_URL: ${APP_URL}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      CART_SESSION_SECRET: ${CART_SESSION_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      EMAIL_PROVIDER: ${EMAIL_PROVIDER}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      MAILPIT_SMTP_HOST: ${MAILPIT_SMTP_HOST}
      MAILPIT_SMTP_PORT: ${MAILPIT_SMTP_PORT}
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_FROM_ADDRESS: ${BREVO_FROM_ADDRESS}
      BREVO_FROM_NAME: ${BREVO_FROM_NAME}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      UPLOADS_DIR: ${UPLOADS_DIR}
      DOCUMENTS_DIR: ${DOCUMENTS_DIR}
      WC_BASE_URL: ${WC_BASE_URL}
      WC_CONSUMER_KEY: ${WC_CONSUMER_KEY}
      WC_CONSUMER_SECRET: ${WC_CONSUMER_SECRET}
      CHOKIDAR_USEPOLLING: "false"
      WATCHPACK_POLLING: "false"
    ports:
      - "${APP_PORT}:3000"
      - "5555:5555" # For Prisma Studio
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - uploads_data:/app/public/uploads
      - documents_data:/app/storage/documents
    command: pnpm run dev
    mem_limit: 2g
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`creatyss.localhost`)"
      - "traefik.http.routers.app.entrypoints=https"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.services.app.loadbalancer.server.port=3000"

  traefik:
    image: traefik:v3
    container_name: creatyss-traefik
    profiles: ["proxy"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/tls.yml:/etc/traefik/tls.yml:ro
      - ./docker/traefik/certs:/certs:ro
    mem_limit: 128m
    restart: unless-stopped

  seeder:
    build:
      context: .
      dockerfile: Dockerfile
    image: creatyss-dev
    container_name: creatyss-seeder
    profiles: ["jobs"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      UPLOADS_DIR: ${UPLOADS_DIR}
      DOCUMENTS_DIR: ${DOCUMENTS_DIR}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME}
      MAILPIT_SMTP_HOST: ${MAILPIT_SMTP_HOST}
      MAILPIT_SMTP_PORT: ${MAILPIT_SMTP_PORT}
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_FROM_ADDRESS: ${BREVO_FROM_ADDRESS}
      BREVO_FROM_NAME: ${BREVO_FROM_NAME}
      WC_BASE_URL: ${WC_BASE_URL}
      WC_CONSUMER_KEY: ${WC_CONSUMER_KEY}
      WC_CONSUMER_SECRET: ${WC_CONSUMER_SECRET}
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - uploads_data:/app/public/uploads
      - documents_data:/app/storage/documents
    command: pnpm run seed:dev
    mem_limit: 512m
    restart: "no"

volumes:
  app_node_modules:
  postgres_data:
  uploads_data:
  documents_data:
