services:
  traefik:
    image: traefik:v3
    container_name: creatyss-traefik
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/tls.yml:/etc/traefik/tls.yml:ro
      - ./docker/traefik/certs:/certs:ro
    restart: unless-stopped

  registry:
    image: nginx:alpine
    container_name: creatyss-registry
    volumes:
      - ./registry:/usr/share/nginx/html:ro
      - ./docker/registry/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.registry.rule=Host(`registry.creatyss.localhost`)"
      - "traefik.http.routers.registry.entrypoints=https"
      - "traefik.http.routers.registry.tls=true"
      - "traefik.http.services.registry.loadbalancer.server.port=80"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: creatyss-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_URL: ${APP_URL}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      CART_SESSION_SECRET: ${CART_SESSION_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      BREVO_API_KEY: ${BREVO_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      EMAIL_FROM: ${EMAIL_FROM}
      UPLOADS_DIR: ${UPLOADS_DIR}
    ports:
      - "${APP_PORT}:3000"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    command: pnpm run dev
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=Host(`creatyss.localhost`)"
      - "traefik.http.routers.app.entrypoints=https"
      - "traefik.http.routers.app.tls=true"
      - "traefik.http.services.app.loadbalancer.server.port=3000"

  db:
    container_name: creatyss-db
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  app_node_modules:
  postgres_data:
