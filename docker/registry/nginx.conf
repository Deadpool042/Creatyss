server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Headers for all responses
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type" always;
    add_header Cache-Control "no-cache" always;

    default_type application/json;

    # Handle preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # /r/styles/[style]/[name].json → /items/[name].json
    # (matches official shadcn URL pattern if style prefix is used)
    location ~ ^/r/styles/[^/]+/(?<name>[^/]+\.json)$ {
        try_files /items/$name =404;
    }

    # /r/[name].json → /items/[name].json
    location ~ ^/r/(?<name>[^/]+\.json)$ {
        try_files /items/$name =404;
    }

    # /[name].json → try /items/[name].json first, then direct file
    location ~ ^/(?<name>[a-z][a-z0-9-]*\.json)$ {
        try_files /items/$name /$name =404;
    }

    # /items/ and /index.json served directly
    location / {
        try_files $uri =404;
    }
}
